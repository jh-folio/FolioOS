name: Folio OS Task
description: Track a feature, bug fix, release task, or documentation task.
title: "[Task] "
labels: []
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What user-visible outcome should this work produce?
      placeholder: "Describe the expected result."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included?
      placeholder: "- "
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What should stay out of this issue?
      placeholder: "- "
    validations:
      required: false
  - type: input
    id: local_plan
    attributes:
      label: Local plan
      description: Optional public-safe relative path to a local/private plan, such as roadmap/example.md.
      placeholder: "roadmap/..."
    validations:
      required: false
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: What must pass before this issue can close?
      placeholder: |
        - [ ] Tests
        - [ ] Manual QA
        - [ ] Release/security checks
    validations:
      required: true
  - type: dropdown
    id: release_security_impact
    attributes:
      label: Release/security impact
      options:
        - None
        - Release packaging
        - Public documentation
        - Local/private data boundary
        - Secrets/configuration
    validations:
      required: true
